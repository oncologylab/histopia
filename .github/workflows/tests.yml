name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install native WSI dependency
        run: sudo apt-get update && sudo apt-get install --yes libvips

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev,registration,semantic,wsi]"

      - name: Run Ruff
        run: python -m ruff check . && python -m ruff format --check .

      - name: Run pytest
        run: python -m pytest

  browser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and browser
        run: |
          python -m pip install -e ".[browser-test,registration,semantic,wsi]"
          python -m playwright install --with-deps chromium

      - name: Run browser checks
        run: python -m pytest -m browser
